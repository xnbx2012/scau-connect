name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: false
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.10'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            target: windows
            artifact_name: scau-connect-windows-x64

          # Linux x64
          - os: ubuntu-22.04
            target: linux
            artifact_name: scau-connect-linux-x64

          # macOS (Apple Silicon; x64 Intel Mac users can build from source)
          - os: macos-14
            target: macos
            artifact_name: scau-connect-macos-arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build dependencies
        run: |
          pip install --upgrade pip wheel setuptools hatchling

      - name: Build Python package
        run: pip install . --index-url https://pypi.org/simple/

      - name: Build with PyInstaller (Linux/macOS)
        if: matrix.target != 'windows'
        run: |
          pip install pyinstaller --index-url https://pypi.org/simple/
          pyinstaller scau-connect.spec

      - name: Build with PyInstaller (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          pip install pyinstaller --index-url https://pypi.org/simple/
          pyinstaller scau-connect.spec

      - name: Make executable (Linux/macOS)
        if: matrix.target != 'windows'
        run: |
          chmod +x dist/scau-connect

      - name: Package (Linux/macOS tar.gz)
        if: matrix.target != 'windows'
        run: |
          cd dist
          tar -czvf ${{ matrix.artifact_name }}.tar.gz scau-connect

      - name: Package (Windows zip)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/build" | Out-Null
          Move-Item -Path "dist/scau-connect.exe" -Destination "dist/build/scau-connect.exe"
          Compress-Archive -Path "dist/build/scau-connect.exe" -DestinationPath "dist/${{ matrix.artifact_name }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          # Copy all artifacts to release folder
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir"/* "release/${name#scau-connect-}"
          done
          ls -la release/

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ -z "$VERSION" ] || [ "$VERSION" == "$GITHUB_REF" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }} Release
          body: |
            ## scau-connect v${{ steps.version.outputs.VERSION }}

            A reverse-proxy tool that automates CAS authentication for SCAU aTrust VPN gateway.

            ### Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | Windows | x64 | `scau-connect-windows-x64.zip` |
            | Linux | x64 | `scau-connect-linux-x64.tar.gz` |
            | macOS | ARM64 (Apple Silicon) | `scau-connect-macos-arm64.tar.gz` |

            ### Quick Start

            1. Download the appropriate binary for your platform
            2. Extract the archive
            3. Run the binary

            ### Usage

            ```bash
            # Login and start proxy
            ./scau-connect login --username YOUR_ID --password YOUR_PASSWORD

            # Start with existing session
            ./scau-connect proxy

            # Check status
            ./scau-connect status
            ```

            ### Requirements

            - Windows: Chrome or Edge browser
            - Linux/macOS: Chrome or Edge browser

            The browser's WebDriver will be auto-downloaded on first run.

            ### Notes

            - HTTPS proxy uses a self-signed CA certificate. Use `-k` flag with curl or import the CA certificate from `.proxy-ca/`.
            - Session data is saved to `.session.json` for auto-reconnect.

            For more details, see the [README](https://github.com/xnbx2012/scau-connect#readme).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
